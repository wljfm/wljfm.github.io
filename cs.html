<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Code Block with Line Numbers</title>
  <!-- 引入 Prism.js 样式库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism.min.css" />
  <!-- 引入 VS Code 字体 -->
  <style>
    @font-face {
      font-family: 'VS Code Font';
      src: url('https://cdn.jsdelivr.net/npm/vscode-codicons@4.1.0/dist/codicon.ttf');
    }
  </style>
  <!-- 引入自定义 CSS 样式 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 代码块 -->
  <div class="code-block">
    <pre>
      <code class="line-numbers language-javascript">
        a = 1
        print(a)
      </code>
    </pre>
  </div>

  <!-- 引入 Prism.js 库和自定义 JS 代码 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
